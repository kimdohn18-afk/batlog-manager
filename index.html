<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>야구수첩 감독판</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header class="header">
  <h1>⚾ 야구수첩 감독판</h1>
</header>

<nav class="tabs">
  <button class="tab on" onclick="switchTab('players')">선수목록</button>
  <button class="tab" onclick="switchTab('games')">경기</button>
  <button class="tab" onclick="switchTab('stats')">팀스탯</button>
  <button class="tab" onclick="switchTab('settings')">설정</button>
</nav>

<section class="tab-content" id="playersTab"></section>
<section class="tab-content" id="gamesTab" style="display:none"></section>
<section class="tab-content" id="statsTab" style="display:none"></section>
<section class="tab-content" id="settingsTab" style="display:none"></section>

<button class="fab" id="fabBtn">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="modal-bg" id="modalFullBg">
  <div class="modal-full" id="modalFullBox"></div>
</div>

<script src="app.js"></script>
<script src="ui.js"></script>
<script src="modal.js"></script>
  <!-- 🔴 아래 부분만 새로 추가 -->
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
